spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rms}
    username: ${SPRING_DATASOURCE_USERNAME:rms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:rms_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-replace-in-production-must-be-at-least-64-chars-long}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:4000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4000}

server:
  port: 8090
